// SoF Ladder 1v1 match server config (exec at map load)
set hostname "SoF Ladder 1v1"
set maxclients "2"
set maxspectators "0"
set fraglimit "20"
set timelimit "15"
set deathmatch "1"
set public "0"
set logfile "1"
set rcon_password_logger ""

set _sp_sv_log_stats "1"
set _sp_sv_log_events "1"
set _sp_sv_master_gamespy ""
set _sp_sv_master_sofplus ""

set_dmflags 03 09 13

// Report results on map end via SoFplus script
set _sp_sv_on_map_end "ladder_report"
